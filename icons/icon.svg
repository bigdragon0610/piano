<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- App icon background (rounded square) -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Piano keyboard body -->
  <!-- keys span x=49..463 (414px), body adds 5px padding each side → x=44, width=424, center=256 -->
  <rect x="44" y="140" width="424" height="232" rx="10" fill="#1a1a1a" stroke="#444" stroke-width="2"/>

  <!-- White keys (8 keys: C D E F G A B C') -->
  <!-- width=50, gap=2, step=52, total=414, start=(512-414)/2=49, end=49+414=463, center=256 ✓ -->
  <g filter="url(#shadow)">
    <rect x="49"  y="148" width="50" height="216" rx="6" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="101" y="148" width="50" height="216" rx="6" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="153" y="148" width="50" height="216" rx="6" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="205" y="148" width="50" height="216" rx="6" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="257" y="148" width="50" height="216" rx="6" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="309" y="148" width="50" height="216" rx="6" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="361" y="148" width="50" height="216" rx="6" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="413" y="148" width="50" height="216" rx="6" fill="white" stroke="#ccc" stroke-width="1.5"/>
  </g>

  <!-- Black keys (C# D# F# G# A#) -->
  <!-- step=52. Black key width=32 (half=16).                        -->
  <!-- boundary center = (right_of_lower + left_of_upper) / 2       -->
  <!-- C# : ( 99+101)/2=100, left=100-16= 84                        -->
  <!-- D# : (151+153)/2=152, left=152-16=136                        -->
  <!-- F# : (255+257)/2=256, left=256-16=240                        -->
  <!-- G# : (307+309)/2=308, left=308-16=292                        -->
  <!-- A# : (359+361)/2=360, left=360-16=344                        -->
  <g fill="#111">
    <rect x="84"  y="148" width="32" height="132" rx="5"/>
    <rect x="136" y="148" width="32" height="132" rx="5"/>
    <rect x="240" y="148" width="32" height="132" rx="5"/>
    <rect x="292" y="148" width="32" height="132" rx="5"/>
    <rect x="344" y="148" width="32" height="132" rx="5"/>
  </g>

  <!-- Subtle shine on black keys -->
  <g fill="none" stroke="#333" stroke-width="1" opacity="0.6">
    <rect x="85"  y="149" width="30" height="60" rx="4"/>
    <rect x="137" y="149" width="30" height="60" rx="4"/>
    <rect x="241" y="149" width="30" height="60" rx="4"/>
    <rect x="293" y="149" width="30" height="60" rx="4"/>
    <rect x="345" y="149" width="30" height="60" rx="4"/>
  </g>

  <!-- Musical note decoration -->
  <text x="256" y="118" text-anchor="middle" font-family="serif" font-size="42" fill="#555">♪</text>
</svg>
